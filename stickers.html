<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stickers - Uninstant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <nav class="site-header navbar" aria-label="Main navigation">
      <a class="navbar__brand" href="index.html" aria-label="Uninstant home">
        <span class="navbar__logo">Uninstant</span>
      </a>

      <button
        class="navbar__menu-button"
        type="button"
        aria-expanded="false"
        aria-controls="primary-menu"
      >
        <span class="material-symbols-outlined notranslate" translate="no" aria-hidden="true">menu</span>
        <span class="sr-only">Open menu</span>
      </button>

      <ul class="navbar__links" id="primary-menu">
        <li><a href="scenes.html">Scenes</a></li>
        <li>
          <a class="is-active" href="stickers.html" aria-current="page">Stickers</a>
        </li>
        <li><a href="command.html">Command</a></li>
      </ul>

      <div class="navbar__actions" aria-label="Cart">
        <button class="icon-button theme-toggle" type="button" aria-label="Switch to dark mode">
          <span class="material-symbols-outlined notranslate" translate="no" aria-hidden="true">dark_mode</span>
        </button>
        <button class="icon-button" type="button" aria-label="Cart">
          <span class="material-symbols-outlined notranslate" translate="no" aria-hidden="true">shopping_bag</span>
        </button>
      </div>
    </nav>

    <main class="stickers-page">
      <p class="stickers-intro">
        Small marks for everyday moments, ready to collect, send, and keep moving.
      </p>

      <section class="stickers-toolbar" aria-label="Sticker browsing options">
        <div class="filters">
          <button
            class="filter-button"
            type="button"
            aria-expanded="true"
            aria-controls="sticker-filters"
          >
            Filter
          </button>
          <div class="filters-list is-open" id="sticker-filters" aria-label="Sticker filters">
            <button class="filter-chip is-active" type="button" data-filter="all" aria-pressed="true">
              All
            </button>
            <button class="filter-chip" type="button" data-filter="le-cercle" aria-pressed="false">
              Le Cercle
            </button>
            <button class="filter-chip" type="button" data-filter="le-jardin" aria-pressed="false">
              Le Jardin
            </button>
            <button class="filter-chip" type="button" data-filter="minuscules" aria-pressed="false">
              Minuscules
            </button>
            <button class="filter-chip" type="button" data-filter="envolees" aria-pressed="false">
              Envolées
            </button>
          </div>
        </div>

        <div class="view-toggle" aria-label="Choose grid view">
          <button
            class="view-toggle__button"
            type="button"
            data-view="single"
            aria-label="Single column view"
            aria-pressed="false"
          >
            <span class="view-icon view-icon--single" aria-hidden="true"></span>
          </button>
          <button
            class="view-toggle__button is-active"
            type="button"
            data-view="columns"
            aria-label="Three column view"
            aria-pressed="true"
          >
            <span class="view-icon view-icon--columns" aria-hidden="true"></span>
          </button>
          <button
            class="view-toggle__button"
            type="button"
            data-view="compact"
            aria-label="Compact grid view"
            aria-pressed="false"
          >
            <span class="view-icon view-icon--grid" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
        </div>
      </section>

      <section class="stickers-grid stickers-grid--columns" aria-label="Sticker catalog"></section>

      <dialog class="product-modal" aria-labelledby="product-modal-title">
        <div class="product-modal__panel">
          <button class="product-modal__close" type="button" aria-label="Close product modal">
            <span class="material-symbols-outlined notranslate" translate="no" aria-hidden="true">close</span>
          </button>

          <section class="product-modal__gallery" aria-label="Sticker preview">
            <button
              class="product-modal__arrow product-modal__arrow--prev"
              type="button"
              aria-label="Previous image"
            >
              <span class="material-symbols-outlined notranslate" translate="no" aria-hidden="true">chevron_left</span>
            </button>

            <img
              class="product-modal__image"
              src="asset/Le%20Cercle/Alba.png"
              alt="Alba preview"
              width="900"
              height="900"
            />

            <button
              class="product-modal__arrow product-modal__arrow--next"
              type="button"
              aria-label="Next image"
            >
              <span class="material-symbols-outlined notranslate" translate="no" aria-hidden="true">chevron_right</span>
            </button>

            <div class="product-modal__dots" aria-label="Image position">
              <button class="is-active" type="button" aria-label="Show image 1"></button>
              <button type="button" aria-label="Show image 2"></button>
              <button type="button" aria-label="Show image 3"></button>
            </div>
          </section>

          <section class="product-modal__details">
            <div class="product-modal__head">
              <div class="product-modal__sticky-title">
                <h2 class="product-modal__title" id="product-modal-title">Sticker</h2>
                <p class="product-modal__price product-modal__price--header" aria-live="polite">$0</p>
              </div>
            </div>

            <div class="product-modal__sheet">
            <div class="product-modal__scroll">
              <form class="product-options">
              <fieldset class="product-option-group">
                <legend>Size</legend>
                <label class="option-card">
                  <input type="radio" name="sticker-size" value="Mini" data-price="0" checked />
                  <span>Mini</span>
                  <small>Base price</small>
                </label>
                <label class="option-card">
                  <input type="radio" name="sticker-size" value="Regular" data-price="4" />
                  <span>Regular</span>
                  <small>+$4</small>
                </label>
                <label class="option-card">
                  <input type="radio" name="sticker-size" value="Poster" data-price="12" />
                  <span>Poster</span>
                  <small>+$12</small>
                </label>
              </fieldset>

              <fieldset class="product-option-group">
                <legend>Finish</legend>
                <label class="option-card">
                  <input type="radio" name="sticker-finish" value="Matte" data-price="0" checked />
                  <span>Matte</span>
                  <small>Included</small>
                </label>
                <label class="option-card">
                  <input type="radio" name="sticker-finish" value="Gloss" data-price="3" />
                  <span>Gloss</span>
                  <small>+$3</small>
                </label>
                <label class="option-card">
                  <input type="radio" name="sticker-finish" value="Holographic" data-price="8" />
                  <span>Holographic</span>
                  <small>+$8</small>
                </label>
              </fieldset>

              <fieldset class="product-option-group">
                <legend>Quantity</legend>
                <label class="option-card">
                  <input type="radio" name="sticker-quantity" value="Single" data-price="0" checked />
                  <span>Single</span>
                  <small>1 piece</small>
                </label>
                <label class="option-card">
                  <input type="radio" name="sticker-quantity" value="Pack" data-price="10" />
                  <span>Pack</span>
                  <small>+$10</small>
                </label>
              </fieldset>
              </form>
            </div>

            <div class="product-modal__footer">
              <p class="product-modal__price product-modal__price--cta">$0</p>
              <button class="button product-modal__cta" type="button">Add to cart</button>
            </div>
            </div>
          </section>
        </div>
      </dialog>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p class="site-footer__note">© 2026 Uninstant</p>
        <nav class="site-footer__social" aria-label="Social media">
          <a href="#">Instagram</a>
          <a href="#">X</a>
          <a href="#">TikTok</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
