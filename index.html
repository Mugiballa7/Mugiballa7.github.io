    <link rel="stylesheet" href="styles.css" />
    <script>
      (() => {
        const stored = localStorage.getItem('atelier-theme');
        const theme =
          stored ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();

            <span

              aria-hidden="true"
