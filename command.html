<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Command — Uninstant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <nav class="site-header navbar" aria-label="Main navigation">
      <a class="navbar__brand" href="index.html" aria-label="Uninstant home">
        <span class="navbar__logo">Uninstant</span>
      </a>

      <button
        class="navbar__menu-button"
        type="button"
        aria-expanded="false"
        aria-controls="primary-menu"
      >
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
        <span class="sr-only">Open menu</span>
      </button>

      <ul class="navbar__links" id="primary-menu">
        <li><a href="scenes.html">Scenes</a></li>
        <li><a href="stickers.html">Stickers</a></li>
        <li>
          <a class="is-active" href="command.html" aria-current="page">Command</a>
        </li>
      </ul>

      <div class="navbar__actions" aria-label="Cart">
        <button class="icon-button theme-toggle" type="button" aria-label="Switch to dark mode">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </button>
        <button class="icon-button" type="button" aria-label="Cart">
          <span class="material-symbols-outlined" aria-hidden="true">shopping_bag</span>
        </button>
      </div>
    </nav>

    <main class="command-page">
      <section class="command-panel" aria-labelledby="command-title">
        <h1 class="command-hero__title" id="command-title">Tell us what you want to make.</h1>
        <p class="command-hero__text">
          Send a short brief by email, or message us through socials if that feels easier.
        </p>

        <div class="command-actions">
          <a
            class="command-mail"
            href="mailto:hello@uninstant.com?subject=Uninstant%20command"
          >
            hello@uninstant.com
          </a>
          <nav class="command-social__links" aria-label="Social media contact links">
            <a href="#">Instagram</a>
            <a href="#">X</a>
            <a href="#">TikTok</a>
          </nav>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p class="site-footer__note">© 2026 Uninstant</p>
        <nav class="site-footer__social" aria-label="Social media">
          <a href="#">Instagram</a>
          <a href="#">X</a>
          <a href="#">TikTok</a>
        </nav>
      </div>
    </footer>
